name: Microsoft Defender Domain Vocabulary
provider: Microsoft Defender
providerId: microsoft-defender
description: Tag-derived vocabulary for the Microsoft Defender API surface; sourced from openapi/ tags.
terms:
- term: Alerts
  description: Manage security alerts generated by Microsoft Defender for Endpoint. Alerts represent detected threats, suspicious
    activities, and security events on endpoints.
- term: Machines
  description: Manage devices (machines) that have communicated with Microsoft Defender for Endpoint. Retrieve device information,
    health status, risk scores, and exposure levels.
- term: Vulnerabilities
  description: Retrieve vulnerability information from Microsoft Defender Vulnerability Management. Access CVE data, severity
    scores, exploit information, and exposure metrics.

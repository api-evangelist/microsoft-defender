description: FOCUS-aligned FinOps for Microsoft Defender — hybrid model. User-licensed Defender
  products (Endpoint, Identity, Office 365, Cloud Apps) bill per user per month and roll up
  through M365 commerce. Defender for Cloud (Servers, Storage, Databases, Containers, CSPM)
  bills per Azure resource per hour and rolls up through Azure Cost Management with FOCUS-aligned
  exports. Optimization centers on right-sizing seat coverage, scoping Defender for Cloud
  plans per subscription, and avoiding double-coverage on E5 customers.

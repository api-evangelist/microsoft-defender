meters:
  - name: defender_endpoint_seats
    description: Defender for Endpoint Plan 1/2 user seats.
    unit: user-month
    aggregation: max
    dimensions:
      - plan
      - department
      - cost_center
  - name: defender_office_seats
    description: Defender for Office 365 Plan 1/2 user seats.
    unit: user-month
    aggregation: max
    dimensions:
      - plan
      - tenant
  - name: defender_identity_seats
    description: Defender for Identity user seats.
    unit: user-month
    aggregation: max
    dimensions:
      - tenant
  - name: defender_servers_hours
    description: Defender for Servers Plan 1/2 server-hour consumption.
    unit: server-hour
    aggregation: sum
    dimensions:
      - plan
      - subscription
      - region
      - resource_group
  - name: defender_storage_accounts
    description: Defender for Storage protected accounts.
    unit: account-month
    aggregation: max
    dimensions:
      - subscription
      - region
  - name: defender_storage_transactions
    description: Storage operations metered by Defender for Storage.
    unit: 1000-transactions
    aggregation: sum
    dimensions:
      - account
  - name: defender_databases_vcore_hours
    description: Defender for SQL / Cosmos DB protection.
    unit: vcore-hour
    aggregation: sum
    dimensions:
      - db_type
      - subscription
  - name: defender_containers_vcore_hours
    description: Defender for Containers per-vCore-hour.
    unit: vcore-hour
    aggregation: sum
    dimensions:
      - cluster
      - cloud
  - name: defender_cspm_resources
    description: Resources covered by Defender CSPM (Plan 2).
    unit: resource-month
    aggregation: max
    dimensions:
      - resource_type
      - subscription
principles:
  - name: Visibility
    description: Microsoft 365 admin center surfaces Defender seat allocations. Microsoft
      Defender portal > Settings > Pricing shows Defender for Cloud plan coverage per
      subscription. Azure Cost Management exports show per-meter line items in FOCUS format.
      Use Microsoft Sentinel + Defender XDR for unified security event telemetry.
  - name: Allocation
    description: Tag Azure subscriptions with cost-center to allocate Defender for Cloud
      charges. For seat-based SKUs, use Entra ID dynamic groups by department to drive license
      assignment and chargeback.
  - name: Optimization
    description: Avoid stacking — E5 / E5 Security customers already include Defender P2,
      Identity, MDO P2, MDCA. Disable redundant standalone purchases. Scope Defender for Cloud
      Plans per subscription, not tenant-wide — turn off Storage / Containers plans on
      subscriptions without those resources. Use Plan 1 for Servers if you only need EDR; use
      P2 only where vulnerability assessment / FIM is required. Reclaim Endpoint seats from
      offboarded users monthly.
  - name: Accountability
    description: Security team owns plan selection; FinOps validates billing impact before
      enabling new Defender for Cloud plans. Set Cost Management budgets on the security
      management group with alerts at 80/100%. Monthly seat reconciliation against Entra ID
      active users.
